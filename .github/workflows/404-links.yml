name: Dead link checker

on:
  push:
    branches: [ master ]
  pull_request:
    types: [assigned, opened, synchronize, reopened]
jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - uses: JustinBeckwith/linkinator-action@v2
      with:
         paths: README.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
